spring:
  application:
    name: yfl-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:yfl}
    username: ${DB_USER:yfl_user}
    password: ${DB_PASSWORD:yfl_local_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

server:
  port: 8080